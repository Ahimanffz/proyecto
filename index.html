<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KyroX Technology | Sales & Inventory</title>

    <!-- ETIQUETAS PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="apple-touch-icon" href="img/icon-192x192.png">

    <!-- Google Fonts y Phosphor Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- Archivo CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Contenedor Principal (Layout) -->
    <!-- Contenedor Principal (Layout) -->
    <div class="app-layout">
        
        <!-- HEADER MÓVIL (Solo visible en teléfonos) -->
        <div class="mobile-header">
            <h2>KyroX Shop</h2>
            <button id="btn-menu-toggle" class="btn-icon">
                <i class="ph ph-list"></i>
            </button>
        </div>

        <!-- BARRA LATERAL / MENÚ DESPLEGABLE -->
        <aside class="sidebar glass" id="sidebar-menu">
            <!-- Este logo se verá solo en PC -->
            <div class="brand-logo desktop-only">
                <h2>KyroX Shop</h2>
            </div>
            
            <!-- Todas tus opciones del menú -->
            <div class="backup-actions">
                <button id="btn-install-app" class="btn-outline hidden" style="border-color: var(--primary-color); color: var(--primary-color); font-weight: bold;">
                    <i class="ph ph-device-mobile"></i> Instalar App
                </button>
                <button id="btn-theme-toggle" class="btn-outline"><i class="ph ph-sun"></i> Modo Claro</button>
                <button id="btn-export" class="btn-outline"><i class="ph ph-download-simple"></i> Exportar CSV</button>
                <label for="btn-import" class="btn-outline label-btn">
                    <i class="ph ph-upload-simple"></i> Importar CSV
                    <input type="file" id="btn-import" accept=".csv" style="display: none;">
                </label>
                <button id="btn-reset-system" class="btn-outline btn-danger-outline"><i class="ph ph-warning"></i> Reiniciar Sistema</button>
            </div>
        </aside>

        <!-- CONTENIDO PRINCIPAL -->
        <!-- ... (tu etiqueta <main> sigue exactamente igual) ... -->

        <!-- CONTENIDO PRINCIPAL -->
        <main class="main-content">
            <header>
                <h1>Gestión de Inventario y Ventas</h1>
            </header>

            <!-- Panel de Ingreso de Datos -->
            <section class="form-section">
                <div class="form-grid">
                    <div class="input-group">
                        <input type="text" id="product-name" placeholder="Nombre del producto">
                    </div>
                    <div class="input-group">
                        <input type="number" id="product-qty" placeholder="Cantidad">
                    </div>
                    <div class="input-group">
                        <input type="number" id="product-price" placeholder="Precio ($)">
                    </div>
                    <button id="btn-add-product" class="btn-primary">Agregar Producto</button>
                </div>
            </section>

            <!-- TABLA DE INVENTARIO -->
            <section class="inventory-section mt-4">
                <h2>Inventario Actual</h2>
                
                <!-- AQUÍ ESTÁ EL CONTENEDOR QUE FALTABA -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Precio Unitario</th>
                                <th>Total</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-list">
                            <!-- Los datos se insertarán dinámicamente con JavaScript -->
                        </tbody>
                    </table>
                </div>
                <!-- FIN DEL CONTENEDOR DE LA TABLA -->

            </section>
        </main>
    </div>

    <!-- Contenedor para Notificaciones -->
    <div id="toast-container"></div>

    <!-- SCRIPT DEL SERVICE WORKER (Para PWA) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(registration => console.log('ServiceWorker registrado con éxito'))
                    .catch(err => console.log('Error al registrar el ServiceWorker:', err));
            });
        }
    </script>
    
    <!-- Archivo JS Principal -->
    <script src="js/script.js"></script>
</body>
</html>
